name: Build Windows Installer

on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build:win -- --publish never
      - id: appversion
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/v$version" | grep -q v; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: hon-reborn-mod-manager-windows-setup
          path: |
            app/dist/*.exe
            app/dist/latest.yml
          if-no-files-found: error
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v') || steps.appversion.outputs.released == 'false'
        with:
          tag_name: v${{ steps.appversion.outputs.version }}
          files: |
            app/dist/*.exe
            app/dist/latest.yml
          fail_on_unmatched_files: true
